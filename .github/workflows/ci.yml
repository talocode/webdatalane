name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - run: npm run build

      - run: npm test

      - run: npm pack --dry-run

      - name: Pack and verify CLI
        run: |
          PACKAGE=$(npm pack)
          echo "Tarball: $PACKAGE"
          TMPDIR=$(mktemp -d)
          cp "$PACKAGE" "$TMPDIR/"
          cd "$TMPDIR"
          npm init -y > /dev/null 2>&1
          npm install "./$PACKAGE" > /dev/null 2>&1
          npx webdatalane --help
